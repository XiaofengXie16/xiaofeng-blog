name: Scheduled Test

on:
  schedule:
    # Runs every 10 minutes from 7:20pm to 9:00pm America/New_York.
    - cron: '20,30,40,50 19 * * *'
      timezone: America/New_York
    - cron: '0,10,20,30,40,50 20 * * *'
      timezone: America/New_York
    - cron: '0 21 * * *'
      timezone: America/New_York
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Run tests
        run: vp test run
