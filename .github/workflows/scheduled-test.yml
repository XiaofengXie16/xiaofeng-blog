name: Scheduled Test

on:
  schedule:
    # Runs every 10 minutes from 7:20pm to 9:00pm EDT (UTC-4).
    # Note: GitHub Actions cron runs in UTC and does not adjust for DST.
    - cron: '20,30,40,50 23 * * *'
    - cron: '0,10,20,30,40,50 0 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Run tests
        run: vp test run
