name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Version and Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Vite+ CLI
        id: vp-cache
        uses: actions/cache@v4
        with:
          path: ~/.vite-plus
          key: vite-plus-${{ runner.os }}

      - name: Install Vite+
        if: steps.vp-cache.outputs.cache-hit != 'true'
        run: curl -fsSL https://vite.plus | bash

      - name: Add Vite+ to PATH
        run: echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create release PR or apply versions
        uses: changesets/action@v1
        with:
          version: bun run version
          commit: "chore: bump version and update changelog"
          title: "chore: bump version and update changelog"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
