name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Version and Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Vite+ CLI
        id: vp-cache
        uses: actions/cache@v4
        with:
          path: ~/.vite-plus
          key: vite-plus-${{ runner.os }}

      - name: Install Vite+
        if: steps.vp-cache.outputs.cache-hit != 'true'
        run: curl -fsSL https://vite.plus | bash

      - name: Add Vite+ to PATH
        run: echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply changesets (version bump + changelog)
        run: bun run version

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version and update changelog [skip ci]"
          git push
